      - generic [ref=e269]:
        - generic [ref=e270]:
          - heading "Is Codeward actually free?" [level=3] [ref=e271]
          - paragraph [ref=e272]: Yes. It's a solo-built project, not a startup with a pricing page waiting to happen. No credit card, no trial timer, no locked features.
        - generic [ref=e273]:
          - heading "What's actually on the platform?" [level=3] [ref=e274]
          - paragraph [ref=e275]: "Six modes: DSA sheets (Blind 75, Striver's, NeetCode 150 + a 300-problem company-tagged bank), a RAG-powered AI mentor, System Design questions with a challenge spinner, 15 Code Review exercises with planted bugs and AI grading, 9 Bug Hunt debugging exercises, and 13 long-form Deep Dives on distributed systems. Everything is free."
        - generic [ref=e276]:
          - heading "How is the AI mentor different from just using ChatGPT?" [level=3] [ref=e277]
          - paragraph [ref=e278]: It's grounded in the app's prep content via retrieval, and it knows your context — your target company, experience level, and what you've already solved. It can also create sheets directly in your account instead of pasting a list back at you.
        - generic [ref=e279]:
          - heading "Do I solve problems inside Codeward?" [level=3] [ref=e280]
          - paragraph [ref=e281]: No. Problems link out to LeetCode or GeeksforGeeks; Codeward is the layer on top — tracking status, revision flags, and notes so you always know what's next.
        - generic [ref=e282]:
          - heading "Can it build a plan for my target company?" [level=3] [ref=e283]
          - paragraph [ref=e284]: Tell the mentor your company and timeline and it generates a pattern-focused sheet weighted toward what that company actually asks, with must-do problems flagged.
